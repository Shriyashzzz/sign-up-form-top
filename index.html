<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-levels Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class = "main-wrapper">
        <aside class = "aside">
            <div class = "image-container">
                <img src="images/logo.png" alt="Tutors teaching students">
            </div>
            <div class="text-logo">
                <img src="images/company-logo-icon.jpg" alt="company logo">
                <span>A-Levels-Tutor</span>
            </div>
            <section class ="credit-photo">
                AI generated photo form Gemeni
            </section>
        </aside>
        <main class = "main">

            <article class = "top-article">
                <div class = "top-article-1">
                    <h3>
                        <div>Expereinced</div> in taking students <div>from "I&apos;m Cooked" to Grade A*</div><br> Let&apos;s go!
                        Sign up <em>now</em> to get Started
                    </h3>
                    </div>
                    <div class = "top-article-2">
                        <h3>
                        Take charge of your future. <em>Starting Now!</em>
                        </h3>
                    </div>
                

            </article>
            <form class = "user-info-form" action="", method="get">
            
                <fieldset class ="user-info-fieldset">
                    <aside class="side-1">
                    
                        <label for="user_name">First Name*</label>
                        <input type="text" id ="user_name" name = "First Name" required minlength="1">

                        <label for="user-email"> Email*</label>
                        <input type="email" id ="user-email" name = "Email"  required>


                        <label for="user-password">Password*</label>
                        <input type="password" name = "Password" id="user-password" min="8", max="12" required pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*_=+-]).{8,12}$">

                    </aside>

                    <aside class = "side-2">
                        <label for="last-name">Last Name*</label>
                        <input type="text" name = "Last Name" id="last-name">
                        <label for="user-phone">Phone Number</label>
                        <input type="tel" name = "Phone Number" id = "user-phone" pattern="(?:7|0\d|\+94\d)\d{8}">
                        <label for="confirm-pass">Confirm Password*</label>
                        <input type="password" name = "Confirm Password" id ="confirm-pass" required min="8", max="12" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*_=+-]).{8,12}$">

                    </aside>
                    

                </fieldset>
                <section class = "submit-container">
                    <button type = "submit">
                        Create Account
                    </button>  
                </section>  
                

            </form>
            <div class = "ask-already-acc">
                Already have an account? <strong>Log in?</strong>               
            </div> 
            <!--
                <div class = "password rules">
                    <ul>
                        <li>At least 1 Uppercase</li>
                        <li>At least 1 Lowercase</li>
                        <li>At least 1 Number</li>
                        <li>At least 1 Symbol: !@#$%^&*_=+-</li>
                        <li>Min 8 chars and Max 12 chars</li>

                    </ul>
            </div>-->


        </main>
    </div>

    
</body>
</html>
